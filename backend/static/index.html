<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Management MVP</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #032147;
        color: #fff;
      }
      main {
        text-align: center;
      }
      h1 {
        color: #ecad0a;
      }
      #message {
        color: #209dd7;
        font-size: 1.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Project Management MVP</h1>
      <p>Backend is running.</p>
      <p id="message">Calling API...</p>
    </main>
    <script>
      fetch("/api/hello")
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("message").textContent = data.message;
        })
        .catch(() => {
          document.getElementById("message").textContent = "API call failed";
        });
    </script>
  </body>
</html>
